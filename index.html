<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 에이전트 비교 도구</title>
<style>
:root{
  --bg:#f7f6f2;--surface:#fff;--border:#e4e2db;
  --text:#1c1c1a;--muted:#8a8880;--hint:#c8c6be;
  --r:12px;--rsm:8px;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-b:#639922;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-b:#7F77DD;
  --amber:#633806;--amber-bg:#FAEEDA;--amber-b:#BA7517;
  --teal:#085041;--teal-bg:#E1F5EE;--teal-b:#1D9E75;
  --pink:#72243E;--pink-bg:#FBEAF0;--pink-b:#D4537E;
  --coral:#712B13;--coral-bg:#FAECE7;--coral-b:#D85A30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOADING SCREEN */
.app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.app-loading p{font-size:13px;color:var(--muted)}
.app-loading.hidden{display:none}

/* HEADER */
.hdr{background:var(--text);padding:14px 18px 12px;position:sticky;top:0;z-index:300}
.hdr-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hdr p{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px}

/* SEARCH */
.search-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:52px;z-index:250;transition:all .2s}
.search-wrap.expanded{position:relative;top:0;z-index:250}
.search-inner{max-width:1000px;margin:0 auto}
.search-input-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 70px 10px 13px;font-size:14px;font-family:inherit;outline:none;background:var(--bg);resize:none;line-height:1.5;transition:all .2s;overflow:hidden}
.search-input:focus{border-color:var(--blue);background:#fff}
.search-input.expanded{min-height:120px;overflow:auto;padding-bottom:10px}
.search-input-actions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px;align-items:center}
.search-input.expanded ~ .search-input-actions{top:12px;transform:none}
.clear-btn{background:none;border:none;cursor:pointer;color:var(--hint);font-size:16px;padding:2px 4px;line-height:1}
.clear-btn:hover{color:var(--muted)}
.search-btn{background:var(--text);color:#fff;border:none;border-radius:var(--rsm);padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.search-btn:disabled{opacity:.4;cursor:not-allowed}
.search-hint{font-size:11px;color:var(--hint);margin-bottom:8px;line-height:1.5;display:none}
.search-input.expanded ~ .search-input-actions ~ .search-hint{display:block}
.mode-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.mode-tags{display:flex;gap:6px;flex-wrap:wrap}
.mode-tag{font-size:12px;padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s}
.mode-tag.active{background:var(--text);color:#fff;border-color:var(--text)}

/* HISTORY */
.history-wrap{max-width:1000px;margin:0 auto;padding:0 14px}
.history-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.history-chip{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:3px 10px;cursor:pointer;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-chip:hover{border-color:var(--hint);color:var(--text)}
.history-label{font-size:10px;color:var(--hint);padding-top:3px;white-space:nowrap}

/* SEARCH RESULT */
.search-result-wrap{max-width:1000px;margin:0 auto;padding:14px 14px 0}
.search-result{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.sr-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.badge-recommend{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.badge-persona{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.badge-free{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue)}
.sr-content{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.sr-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.sr-action-btn{font-size:12px;padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .12s}
.sr-action-btn:hover{background:var(--surface);border-color:var(--hint)}
.sr-action-btn.purple{background:var(--purple-bg);border-color:var(--purple-b);color:var(--purple)}
.sr-action-btn.blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.copied-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 18px;border-radius:99px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.copied-toast.show{opacity:1}

/* LOADING */
.loading-dots{display:inline-flex;gap:4px;align-items:center;padding:4px 0}
.loading-dots span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:dot .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* BANNER */
.banner{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px 12px}
.banner-inner{max-width:1000px;margin:0 auto}
.banner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.banner-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.triple-btn{font-size:12px;font-weight:600;padding:6px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:inherit}
.triple-btn.on{background:var(--amber-bg);border-color:var(--amber-b);color:var(--amber)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;font-family:inherit;transition:all .12s}
.chip:hover{border-color:var(--hint);color:var(--text)}
.chip.s1{background:var(--text);border-color:var(--text);color:#fff}
.chip.s2{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.chip.s3{background:var(--coral-bg);border-color:var(--coral-b);color:var(--coral)}
.chip-num{width:17px;height:17px;border-radius:50%;background:currentColor;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-num-inner{color:#fff}

/* SELBAR */
.selbar{background:var(--bg);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;min-height:38px}
.selbar-inner{max-width:1000px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
.selbar-info{font-size:12px;color:var(--muted)}
.selbar-info strong{color:var(--text);font-weight:700}
.clr-btn{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 12px;cursor:pointer;font-family:inherit}

/* CONTENT */
.content{padding:14px 14px 80px;max-width:1000px;margin:0 auto}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.75}

/* TAGS */
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid;white-space:nowrap}
.tag-llm{background:var(--green-bg);color:var(--green);border-color:var(--green-b)}
.tag-browser{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-b)}
.tag-code{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}
.tag-search{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-b)}
.tag-gpt{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}

/* SINGLE */
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.s-head{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
.s-name{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.s-role{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.s-body{padding:16px 20px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;margin-top:18px}
.sec-lbl:first-child{margin-top:0}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sw-title{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sl,.wl{list-style:none}
.sl li{font-size:13px;line-height:1.85}
.sl li::before{content:"✓ ";color:var(--green)}
.wl li{font-size:13px;line-height:1.85}
.wl li::before{content:"✗ ";color:#A32D2D}
.info-row{background:var(--bg);border-radius:var(--rsm);padding:9px 13px;font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6}
.info-row strong{color:var(--text);font-weight:700}
.opinion-item{background:var(--bg);border-radius:var(--rsm);padding:10px 13px;margin-bottom:6px;font-size:13px;line-height:1.6;color:var(--muted)}
.opinion-item strong{color:var(--text);font-weight:700;display:block;margin-bottom:2px}
.warn-box{background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--amber);margin-top:6px;line-height:1.6}

/* TASK ANALYSIS */
.task-analysis{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.ta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ta-title{font-size:13px;font-weight:700;color:var(--text)}
.ta-query{font-size:12px;color:var(--muted);background:var(--bg);border-radius:var(--rsm);padding:8px 12px;margin-bottom:10px;line-height:1.6}
.ta-query strong{color:var(--text);font-weight:600;display:block;margin-bottom:2px}
.ta-btn{background:var(--text);color:#fff;border:none;border-radius:var(--rsm);padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.ta-btn:disabled{opacity:.4;cursor:not-allowed}
.ta-result{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;margin-top:10px}
.ta-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ta-action-btn{font-size:12px;padding:7px 14px;border-radius:var(--rsm);border:1px solid;cursor:pointer;font-family:inherit;font-weight:600}
.ta-btn-persona{background:var(--purple-bg);border-color:var(--purple-b);color:var(--purple)}
.ta-btn-claude{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}

/* PERSONA */
.persona-section{background:var(--purple-bg);border:1px solid var(--purple-b);border-radius:var(--rsm);padding:14px;margin-top:6px}
.persona-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.persona-title{font-size:12px;font-weight:700;color:var(--purple)}
.persona-update-btn{font-size:11px;font-weight:600;background:var(--purple);color:#fff;border:none;border-radius:99px;padding:5px 13px;cursor:pointer;font-family:inherit}
.persona-update-btn:disabled{opacity:.4;cursor:not-allowed}
.persona-item{margin-bottom:10px}
.persona-item-title{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.persona-list{list-style:none}
.persona-list li{font-size:12px;line-height:1.85;color:#2a1f6e}
.persona-list li::before{content:"→ "}
.update-panel{background:var(--surface);border:1px solid var(--purple-b);border-radius:var(--rsm);padding:14px;margin-top:8px}
.update-panel-title{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px}
.update-textarea{width:100%;border:1px solid var(--border);border-radius:var(--rsm);padding:10px;font-size:12px;font-family:inherit;line-height:1.65;resize:vertical;min-height:140px;outline:none}
.update-textarea:focus{border-color:var(--purple)}
.update-btns{display:flex;gap:8px;margin-top:8px}
.save-btn{background:var(--purple);color:#fff;border:none;border-radius:var(--rsm);padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.cancel-btn{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 13px;font-size:12px;cursor:pointer;font-family:inherit}

/* COMPARE */
.cmp-header-row{display:grid;gap:4px;margin-bottom:8px}
.cmp-header-row.c2{grid-template-columns:1fr 1fr}
.cmp-header-row.c3{grid-template-columns:1fr 1fr 1fr}
.cmp-grid{display:grid;gap:4px}
.cmp-grid.c2{grid-template-columns:1fr 1fr}
.cmp-grid.c3{grid-template-columns:1fr 1fr 1fr}
.cmp-head-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.cmp-head-name{font-size:15px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.cmp-head-role{font-size:11px;color:var(--muted);line-height:1.4}
.cmp-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:12px 4px 5px;grid-column:1/-1}
.cmp-cell{background:var(--surface);border:1px solid var(--border);padding:12px 13px;font-size:12px;line-height:1.7}
.cmp-cell.best{background:var(--green-bg);border-color:var(--green-b)}
.cl{list-style:none}
.cl li{font-size:12px;line-height:1.75}
.cl li::before{content:"✓ ";color:var(--green)}
.wl2{list-style:none}
.wl2 li{font-size:12px;line-height:1.75}
.wl2 li::before{content:"✗ ";color:#A32D2D}
.win-badge{display:inline-block;font-size:10px;font-weight:700;background:var(--green);color:#fff;padding:2px 7px;border-radius:99px;margin-bottom:6px}
.warn-badge-sm{display:inline-block;font-size:10px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b);padding:2px 7px;border-radius:99px;margin-bottom:4px}

/* CONFIRM BUBBLE */
.confirm-bubble{background:var(--surface);border:1.5px solid var(--blue);border-radius:var(--r);padding:14px 16px;margin:0 14px 12px;max-width:1000px;margin-left:auto;margin-right:auto}
.confirm-bubble-inner{max-width:1000px;margin:0 auto;padding:0 14px}
.confirm-text{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:12px}
.confirm-text strong{color:var(--blue)}
.confirm-btns{display:flex;gap:8px}
.confirm-yes{background:var(--text);color:#fff;border:none;border-radius:var(--rsm);padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-yes:hover{opacity:.85}
.confirm-no{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:var(--rsm);padding:9px 16px;font-size:14px;cursor:pointer;font-family:inherit}
.confirm-no:hover{color:var(--text);border-color:var(--hint)}

/* RESPONSIVE */
@media(max-width:600px){
  .hdr h1{font-size:15px}
  .chip{padding:7px 11px;font-size:12px}
  .s-name{font-size:20px}
  .sw-grid{grid-template-columns:1fr}
  .cmp-header-row.c2,.cmp-header-row.c3{grid-template-columns:1fr}
  .cmp-grid.c2,.cmp-grid.c3{grid-template-columns:1fr}
  .content{padding:10px 10px 80px}
  .s-body{padding:14px}
  .s-head{padding:16px 14px 12px}
}
</style>
</head>
<body>

<!-- APP LOADING -->
<div class="app-loading" id="appLoading">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p>모델 데이터 불러오는 중...</p>
</div>

<div class="copied-toast" id="toast">클립보드에 복사됐어 — Claude.ai에서 Ctrl+V</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div><h1>AI 에이전트 비교 도구</h1><p>검색 · 페르소나 · 모델 비교</p></div>
    <button onclick="toggleSecret()" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);background:none;border:1px solid rgba(255,255,255,0.25);padding:5px 11px;border-radius:99px;cursor:pointer;margin-right:8px">⚙ 접근코드</button><a href="/updater.html" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);text-decoration:none;border:1px solid rgba(255,255,255,0.25);padding:5px 11px;border-radius:99px;white-space:nowrap">🔄 업데이터</a>
  </div>
</div>


<!-- SECRET PANEL -->
<div id="secretPanel" style="display:none;background:#1c1c1a;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.1)">
  <div style="max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:10px">
    <span style="font-size:12px;color:rgba(255,255,255,0.6);white-space:nowrap">접근 코드</span>
    <input id="secretInput" type="password" placeholder="접근 코드 입력..." style="flex:1;max-width:300px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:6px 10px;color:#fff;font-size:13px;outline:none">
    <button onclick="saveSecret()" style="background:#c8ff6e;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer">저장</button>
  </div>
</div>
<!-- SEARCH -->
<div class="search-wrap" id="searchWrap">
  <div class="search-inner">
    <div class="search-input-wrap">
      <textarea class="search-input" id="searchInput" rows="1"
        placeholder="질문 입력 — 클릭하면 확장됩니다. 정리 안 된 현업 내용도 그대로 붙여넣기 가능&#10;&#10;【도구 선택 프레임워크】&#10;나는 [문제 설명]을 해결해야 한다. 이 문제를 Claude / Manus / Python / ChatGPT / RAG 중 어떤 도구 조합으로 처리해야 하는가? 각 도구의 역할, 입력값, 출력값, 실행 순서를 명시해줘. 실패 조건과 대안도 포함해줘. 결과를 판단 기준표 형태로 출력해줘."
        onfocus="expandSearch()" oninput="autoResize(this)"></textarea>
      <div class="search-input-actions">
        <button class="clear-btn" onclick="clearSearch()" title="지우기">✕</button>
        <button class="search-btn" id="searchBtn" onclick="doSearch()">검색</button>
      </div>
    </div>
    <div class="search-hint">💡 정리 안 된 내용도 괜찮아요. 길게 붙여넣으면 Claude가 맥락을 파악해서 답변해줍니다.</div>
    <div class="mode-row">
      <div class="mode-tags">
        <button class="mode-tag active" id="tag-auto" onclick="setMode('auto')">자동 감지</button>
        <button class="mode-tag" id="tag-recommend" onclick="setMode('recommend')">추천</button>
        <button class="mode-tag" id="tag-persona" onclick="setMode('persona')">페르소나</button>
        <button class="mode-tag" id="tag-free" onclick="setMode('free')">자유 질문</button>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="history-wrap" id="historyWrap" style="padding-top:8px;display:none">
  <div class="history-row" id="historyRow">
    <span class="history-label">최근:</span>
  </div>
</div>

<div id="confirmArea"></div>
<div id="searchResultArea"></div>

<!-- BANNER -->
<div class="banner">
  <div class="banner-inner">
    <div class="banner-top">
      <span class="banner-label">모델 선택 (비교)</span>
      <button class="triple-btn" id="tripleBtn" onclick="toggleTriple()">3개 비교 모드</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</div>

<div class="selbar">
  <div class="selbar-inner">
    <div class="selbar-info" id="selInfo">모델을 클릭해서 선택하세요</div>
    <button class="clr-btn" onclick="clearSel()">초기화</button>
  </div>
</div>

<div class="content" id="content">
  <div class="empty">
    <div class="empty-icon">🤖</div>
    <h2>모델을 선택하거나 검색해보세요</h2>
    <p>검색창: 자연어 질문 → 추천 + 페르소나 설계<br>배너: 모델 클릭 → 단독 상세 / 2~3개 → 비교<br><br>검색 후 모델 클릭 → 해당 모델 작업 적합도 분석</p>
  </div>
</div>

<script>
// ── APP SECRET ──
function getSecret() { return sessionStorage.getItem('app_secret') || ''; }
function saveSecret() {
  var v = document.getElementById('secretInput').value.trim();
  if (!v) return;
  sessionStorage.setItem('app_secret', v);
  document.getElementById('secretPanel').style.display = 'none';
  alert('저장됐어요! 탭을 닫으면 자동으로 삭제됩니다.');
}
function toggleSecret() {
  var p = document.getElementById('secretPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}
document.addEventListener('DOMContentLoaded', function(){
  if (!getSecret()) {
    document.getElementById('secretPanel').style.display = 'block';
  }
  var si = document.getElementById('secretInput');
  if (si) { si.addEventListener('keydown', function(e){ if(e.key==='Enter') saveSecret(); }); }
});

// ── STATE ──
let MODELS = [];
let modelMap = {};
let searchMode = 'auto';
let selected = [];
let tripleMode = false;
let lastQuery = '';
let lastAnswer = '';
let lastMode = '';

// ── API CALL (server proxy) ──
async function callClaude(body) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-app-secret': getSecret() },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API 오류');
  if (data.error) throw new Error(data.error.message || data.error);
  return data;
}

// ── INIT ──
async function init() {
  try {
    const res = await fetch('/api/models');
    if (!res.ok) throw new Error('models.json 로드 실패');
    const data = await res.json();
    MODELS = Array.isArray(data) ? data : (data.agents || []);
    MODELS.forEach(m => { modelMap[m.id] = m; });
  } catch (e) {
    document.getElementById('appLoading').innerHTML =
      `<p style="color:#A32D2D">모델 데이터를 불러오지 못했습니다.<br>${e.message}</p>`;
    return;
  }

  document.getElementById('appLoading').classList.add('hidden');
  renderChips();
  renderSelBar();
  renderHistory();
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSearch(); }
  });
}

// ── SEARCH INPUT ──
function expandSearch() {
  const input = document.getElementById('searchInput');
  input.classList.add('expanded');
  autoResize(input);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 300) + 'px';
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  input.value = '';
  input.classList.remove('expanded');
  input.style.height = 'auto';
  input.rows = 1;
}

// ── MODE ──
function setMode(m) {
  searchMode = m;
  ['auto', 'recommend', 'persona', 'free'].forEach(id => {
    document.getElementById('tag-' + id).classList.toggle('active', id === m);
  });
}

function detectMode(q) {
  if (searchMode !== 'auto') return searchMode;
  const lq = q.toLowerCase();
  if (['페르소나', '가정하자', '처럼 생각', '입장에서', '라면 어떻게', '관점으로'].some(k => lq.includes(k))) return 'persona';
  if (['추천', '어떤 도구', '만들고 싶어', '하고 싶어', '자동화', '구현', '개발', '어떤 에이전트'].some(k => lq.includes(k))) return 'recommend';
  return 'free';
}

// ── HISTORY ──
function saveHistory(q) {
  let h = JSON.parse(localStorage.getItem('searchHistory') || '[]');
  h = h.filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, 5);
  localStorage.setItem('searchHistory', JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('searchHistory') || '[]');
  const wrap = document.getElementById('historyWrap');
  const row = document.getElementById('historyRow');
  if (!h.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  row.innerHTML = '<span class="history-label">최근:</span>';
  h.forEach(q => {
    const chip = document.createElement('button');
    chip.className = 'history-chip'; chip.title = q; chip.textContent = q;
    chip.onclick = () => {
      document.getElementById('searchInput').value = q;
      expandSearch();
      doSearch();
    };
    row.appendChild(chip);
  });
}

// ── RETRY INPUT ──
function retryInput() {
  document.getElementById('confirmArea').innerHTML = '';
  document.getElementById('searchResultArea').innerHTML = '';
  const input = document.getElementById('searchInput');
  input.focus();
  input.select();
}

// ── SEARCH ──
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '확인 중...';
  const confirmArea = document.getElementById('confirmArea');
  const area = document.getElementById('searchResultArea');
  confirmArea.innerHTML = '';
  area.innerHTML = '';

  try {
    const confirmData = await callClaude({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 150,
      messages: [{
        role: 'user',
        content: `사용자가 해결하고 싶은 문제를 설명했어. 이해한 내용을 한국어로 1~2문장으로 요약해줘.
규칙: 반드시 "이렇게 이해했어요: "로 시작. 무엇을→어떻게→결과 순서. 해결 방법·기술 추천·질문 절대 금지. 사용자가 말한 내용만. 쉬운 말로.

사용자 입력:
${q}`
      }]
    });
    const summary = confirmData.content[0].text.trim();
    btn.disabled = false; btn.textContent = '검색';
    confirmArea.innerHTML = `<div class="confirm-bubble-inner" style="padding-top:12px">
      <div class="confirm-bubble">
        <div class="confirm-text"><strong>🤖 Claude</strong><br>${summary}</div>
        <div class="confirm-btns">
          <button class="confirm-yes" onclick="proceedSearch()">맞아 →</button>
          <button class="confirm-no" onclick="retryInput()">아니야, 다시 입력</button>
        </div>
      </div>
    </div>`;
    lastQuery = q;
  } catch (e) {
    btn.disabled = false; btn.textContent = '검색';
    proceedSearch();
  }
}

async function proceedSearch() {
  const q = lastQuery || document.getElementById('searchInput').value.trim();
  if (!q) return;

  document.getElementById('confirmArea').innerHTML = '';
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '검색 중...';
  const area = document.getElementById('searchResultArea');
  area.innerHTML = `<div class="search-result-wrap"><div class="search-result"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>`;
  const mode = detectMode(q);
  lastQuery = q; lastMode = mode;
  const modelSummary = MODELS.map(m =>
    `[${m.name}] 유형:${m.tagName} 강점:${m.strengths.slice(0, 3).join(',')} 약점:${m.weaknesses.slice(0, 2).join(',')} 단독:${m.alone} 조합:${m.combo}`
  ).join('\n');

  let systemPrompt = '';
  if (mode === 'recommend') {
    systemPrompt = `당신은 AI 에이전트 전문가입니다. 등록된 에이전트 데이터를 기반으로 사용자 질문에 가장 적합한 도구 조합을 추천하세요. 정리 안 된 현업 내용이 들어와도 맥락을 파악해서 답변하세요.\n\n등록 에이전트:\n${modelSummary}\n\n답변 형식:\n1. 추천 조합 (에이전트명 → 에이전트명)\n2. 각 에이전트 역할 (2-3줄)\n3. 주의사항 (있으면)\n4. 등록 에이전트 외 추가 고려 도구 (있으면 "추가 제안:" 으로 구분)\n\n한국어로 답변.`;
  } else if (mode === 'persona') {
    const match = MODELS.find(m => q.includes(m.name));
    if (match) {
      const p = match.persona;
      const override = getPersonaOverride(match.id);
      const pData = override
        ? `(업데이트된 페르소나)\n${override}`
        : `접근순서: ${p.approach.join(' / ')}\n실패패턴: ${p.failPatterns.join(' / ')}\n판단기준: ${p.decisionRules.join(' / ')}`;
      systemPrompt = `당신은 지금부터 ${match.name} 에이전트입니다.\n\n정체성: ${match.identity}\n${pData}\n강점: ${match.strengths.join(', ')}\n약점: ${match.weaknesses.join(', ')}\n\n이 페르소나를 유지하며 사용자 작업 요청에 대해 ${match.name}이라면 어떻게 접근하고 설계할지 구체적으로 답변하세요. 실행 한계는 솔직하게 표시하세요.\n\n한국어로 답변.`;
    } else {
      systemPrompt = `당신은 AI 에이전트 전문가입니다. 사용자가 요청한 에이전트 페르소나로 작업을 설계해주세요.\n\n등록 에이전트 데이터:\n${modelSummary}\n\n한국어로 답변.`;
    }
  } else {
    systemPrompt = `당신은 AI 에이전트 전문가입니다. 정리 안 된 현업 내용이 들어와도 맥락을 파악해서 유용하게 답변하세요.\n\n참고 에이전트 데이터:\n${modelSummary}\n\n한국어로 답변.`;
  }

  try {
    const data = await callClaude({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{ role: 'user', content: q }]
    });
    const answer = data.content[0].text;
    lastAnswer = answer;
    const badgeClass = mode === 'recommend' ? 'badge-recommend' : mode === 'persona' ? 'badge-persona' : 'badge-free';
    const badgeText = mode === 'recommend' ? '추천 모드' : mode === 'persona' ? '페르소나 모드' : '자유 질문';
    if (mode === 'recommend') {
      const mentioned = MODELS.filter(m => answer.includes(m.name));
      if (mentioned.length >= 2) { selected = mentioned.slice(0, 2).map(m => m.id); renderChips(); renderSelBar(); renderContent(); }
    }
    saveHistory(q);
    area.innerHTML = `<div class="search-result-wrap"><div class="search-result">
      <span class="sr-badge ${badgeClass}">${badgeText}</span>
      <div class="sr-content">${answer}</div>
      <div class="sr-actions">
        <button class="sr-action-btn blue" onclick="copyToClaude()">📋 Claude에서 계속하기</button>
        <button class="sr-action-btn" onclick="clearSearch();document.getElementById('searchResultArea').innerHTML=''">✕ 닫기</button>
      </div>
    </div></div>`;
  } catch (e) {
    area.innerHTML = `<div class="search-result-wrap"><div class="search-result"><div style="color:#A32D2D;font-size:13px">오류: ${e.message}</div></div></div>`;
  }
  btn.disabled = false; btn.textContent = '검색';
}

// ── COPY TO CLAUDE ──
function copyToClaude() {
  const text = `[AI 에이전트 도구에서 가져온 대화]\n\n질문: ${lastQuery}\n\n답변:\n${lastAnswer}\n\n---\n위 내용을 바탕으로 더 구체화해줘.`;
  navigator.clipboard.writeText(text).then(() => {
    showToast('클립보드에 복사됐어 — Claude.ai에서 Ctrl+V (모바일: 길게 눌러 붙여넣기)');
    setTimeout(() => window.open('https://claude.ai', '_blank'), 600);
  }).catch(() => {
    prompt('복사해서 Claude.ai에 붙여넣으세요:', text);
  });
}

function copyPersonaToClaude(modelId, taskAnalysis) {
  const m = modelMap[modelId];
  const override = getPersonaOverride(modelId);
  const p = m.persona;
  const pData = override || `접근순서: ${p.approach.join(' / ')}\n실패패턴: ${p.failPatterns.join(' / ')}\n판단기준: ${p.decisionRules.join(' / ')}`;
  const text = `당신은 지금부터 ${m.name} 에이전트입니다.\n\n정체성: ${m.identity}\n${pData}\n강점: ${m.strengths.join(', ')}\n약점: ${m.weaknesses.join(', ')}\n\n[작업 적합도 분석 결과]\n${taskAnalysis}\n\n[원래 질문]\n${lastQuery}\n\n---\n이 페르소나를 유지하며 위 작업을 더 구체적으로 설계해줘.`;
  navigator.clipboard.writeText(text).then(() => {
    showToast(`${m.name} 페르소나 복사됐어 — Claude.ai에서 Ctrl+V`);
    setTimeout(() => window.open('https://claude.ai', '_blank'), 600);
  }).catch(() => {
    prompt('복사해서 Claude.ai에 붙여넣으세요:', text);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── MODEL HISTORY ──
function saveAnalysisHistory(modelId, query, result) {
  const key = 'modelHistory_' + modelId;
  let h = JSON.parse(localStorage.getItem(key) || '[]');
  h.unshift({
    date: new Date().toLocaleDateString('ko-KR'),
    query: query.length > 100 ? query.substring(0, 100) + '...' : query,
    result: result.length > 400 ? result.substring(0, 400) + '...' : result,
    ts: Date.now()
  });
  localStorage.setItem(key, JSON.stringify(h));
}

function getAnalysisHistory(modelId) {
  return JSON.parse(localStorage.getItem('modelHistory_' + modelId) || '[]');
}

function buildHistoryPrompt(modelId) {
  const h = getAnalysisHistory(modelId);
  if (!h.length) return '';
  const summary = localStorage.getItem('modelSummary_' + modelId);
  const recent = h.slice(0, 15);
  const lines = recent.map((item, i) =>
    `[분석 ${i + 1}] ${item.date} / 작업: ${item.query} / 결과요약: ${item.result.substring(0, 150)}`
  ).join('\n');
  let prompt = `\n\n[${modelMap[modelId].name} 실제 사용 이력 — 전체 ${h.length}개 누적, 최근 ${recent.length}개 반영]\n${lines}`;
  if (summary) prompt += `\n\n[패턴 요약본 (${h.length}개 분석 기반)]\n${summary}`;
  prompt += `\n\n위 이력을 참고해서 이 모델의 실제 작업 범위와 한계를 더 정확하게 판단해주세요.`;
  return prompt;
}

async function summarizeHistory(modelId) {
  const h = getAnalysisHistory(modelId);
  if (h.length < 50) { alert(`이력이 ${h.length}개예요. 50개 이상 쌓이면 요약 기능이 활성화됩니다.`); return; }
  const m = modelMap[modelId];
  const btn = document.getElementById('summarize-btn-' + modelId);
  if (btn) { btn.disabled = true; btn.textContent = '요약 중...'; }
  const allLines = h.map((item, i) =>
    `[${i + 1}] ${item.date} 작업: ${item.query} → ${item.result.substring(0, 200)}`
  ).join('\n');
  try {
    const data = await callClaude({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 600,
      messages: [{
        role: 'user',
        content: `${m.name} 에이전트의 실제 사용 분석 이력 ${h.length}개를 보고, 이 에이전트의 실제 작업 패턴을 요약해줘.\n\n이력:\n${allLines}\n\n아래 형식으로 요약:\n1. 자주 성공한 작업 유형 (3-5가지)\n2. 자주 한계를 보인 작업 유형 (3-5가지)\n3. 실제 사용에서 드러난 특이 패턴\n4. 가장 효과적인 조합 패턴\n\n한국어로 간결하게.`
      }]
    });
    const summary = data.content[0].text;
    localStorage.setItem('modelSummary_' + modelId, summary);
    alert('요약 완료! 다음 분석부터 패턴 요약본이 반영됩니다.');
    renderContent();
  } catch (e) { alert('오류: ' + e.message); }
  if (btn) { btn.disabled = false; btn.textContent = '패턴 요약 생성'; }
}

// ── TASK ANALYSIS ──
async function analyzeTask(modelId) {
  if (!lastQuery) { alert('먼저 검색창에 작업 내용을 입력하고 검색해주세요.'); return; }
  const m = modelMap[modelId];
  if (!m) { alert('모델 데이터를 찾을 수 없습니다. 페이지를 새로고침해주세요.\n(오류 ID: ' + modelId + ')'); return; }
  const btn = document.getElementById('ta-btn-' + modelId);
  btn.disabled = true; btn.textContent = '분석 중...';
  const taResult = document.getElementById('ta-result-' + modelId);
  const taActions = document.getElementById('ta-actions-' + modelId);
  taResult.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  taActions.innerHTML = '';
  const historyPrompt = buildHistoryPrompt(modelId);
  const historyCount = getAnalysisHistory(modelId).length;
  try {
    const data = await callClaude({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 900,
      system: `당신은 AI 에이전트 전문가입니다. 특정 작업에 대해 특정 에이전트의 적합도를 분석합니다.\n\n에이전트 기본 데이터:\n이름: ${m.name}\n정체성: ${m.identity}\n강점: ${m.strengths.join(', ')}\n약점: ${m.weaknesses.join(', ')}\n단독 사용: ${m.alone}\n조합: ${m.combo}${historyPrompt}\n\n아래 형식으로 답변:\n✅ 가능한 작업\n⚠️ 주의가 필요한 작업\n❌ 어려운 작업 (이유 포함)\n💡 더 나은 방법\n📋 추가로 필요한 정보${historyCount > 0 ? '\n\n📊 이력 기반 패턴 (' + historyCount + '회 분석 누적)' : ''}\n\n한국어로 답변.`,
      messages: [{ role: 'user', content: `작업 내용:\n${lastQuery}` }]
    });
    const answer = data.content[0].text;
    saveAnalysisHistory(modelId, lastQuery, answer);
    const newCount = getAnalysisHistory(modelId).length;
    const historyBadge = newCount > 1
      ? `<div style="font-size:11px;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal-b);border-radius:99px;padding:2px 9px;display:inline-block;margin-bottom:8px">📊 ${newCount}회 누적 이력 반영됨</div>`
      : '<div style="font-size:11px;color:var(--hint);margin-bottom:8px">첫 번째 분석 — 이력이 쌓일수록 정확해집니다</div>';
    taResult.innerHTML = `${historyBadge}<div class="ta-result">${answer}</div>`;
    taActions.innerHTML = `
      <button class="ta-action-btn ta-btn-persona" onclick="copyPersonaToClaude('${modelId}', \`${answer.replace(/`/g, "'")}\`)">🎭 ${m.name} 페르소나로 Claude에서 이어가기</button>
      <button class="ta-action-btn ta-btn-claude" onclick="copyToClaude()">📋 Claude에서 계속하기</button>
      <button class="ta-action-btn" onclick="showHistory('${modelId}')" style="font-size:11px">📂 이력 보기 (${newCount}개)</button>`;
  } catch (e) {
    taResult.innerHTML = `<div style="color:#A32D2D;font-size:13px">오류: ${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = '이 작업 분석';
}

// ── HISTORY VIEWER ──
function showHistory(modelId) {
  const h = getAnalysisHistory(modelId);
  const m = modelMap[modelId];
  if (!h.length) { alert('아직 이력이 없어.'); return; }
  const summary = localStorage.getItem('modelSummary_' + modelId);
  const canSummarize = h.length >= 50;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:20px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto';
  const summarySection = summary
    ? `<div style="background:#E1F5EE;border:1px solid #1D9E75;border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:#085041;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📊 패턴 요약본 (${h.length}개 분석 기반)</div>
        <div style="font-size:12px;color:#085041;line-height:1.7;white-space:pre-wrap">${summary}</div>
        <button id="summarize-btn-${modelId}" onclick="summarizeHistory('${modelId}')" style="margin-top:8px;font-size:11px;background:#085041;color:#fff;border:none;border-radius:99px;padding:4px 12px;cursor:pointer">재요약</button>
      </div>`
    : canSummarize
      ? `<div style="background:#FAEEDA;border:1px solid #BA7517;border-radius:8px;padding:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;color:#633806">${h.length}개 이력 쌓임 — 패턴 요약 가능</span>
          <button id="summarize-btn-${modelId}" onclick="summarizeHistory('${modelId}')" style="font-size:12px;font-weight:700;background:#633806;color:#fff;border:none;border-radius:99px;padding:5px 13px;cursor:pointer">패턴 요약 생성</button>
        </div>`
      : `<div style="font-size:11px;color:#b8b6ae;margin-bottom:10px">50개 이상 쌓이면 패턴 요약 기능이 활성화됩니다 (현재 ${h.length}개)</div>`;
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div><strong style="font-size:15px">${m.name} 분석 이력</strong><span style="font-size:12px;color:#8a8880;margin-left:6px">전체 ${h.length}개 누적</span></div>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#8a8880">✕</button>
    </div>
    ${summarySection}
    <div style="font-size:11px;color:#8a8880;margin-bottom:8px">프롬프트 반영: 최근 15개 / 전체 이력: ${h.length}개 보존</div>
    ${h.map((item, i) => `
      <div style="background:#f7f6f2;border-radius:8px;padding:12px;margin-bottom:6px;font-size:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <strong style="color:#1c1c1a">${i + 1}번째</strong>
          <span style="color:#8a8880">${item.date}</span>
        </div>
        <div style="color:#5f5e5a;margin-bottom:3px"><strong>작업:</strong> ${item.query}</div>
        <div style="color:#8a8880;line-height:1.6">${item.result}</div>
      </div>`).join('')}
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button onclick="clearHistory('${modelId}');this.closest('div[style*=fixed]').remove()" style="font-size:12px;color:#A32D2D;background:none;border:1px solid #A32D2D;border-radius:8px;padding:6px 14px;cursor:pointer">이력 전체 삭제</button>
    </div>`;
  modal.appendChild(box);
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
}

function clearHistory(modelId) {
  if (!confirm('이 모델의 분석 이력과 패턴 요약을 모두 삭제할까요?')) return;
  localStorage.removeItem('modelHistory_' + modelId);
  localStorage.removeItem('modelSummary_' + modelId);
  renderContent();
}

// ── PERSONA UPDATE ──
async function updatePersona(modelId) {
  const m = modelMap[modelId];
  const btn = document.getElementById('pub-' + modelId);
  btn.disabled = true; btn.textContent = '수집 중...';
  try {
    const data = await callClaude({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      messages: [{
        role: 'user',
        content: `AI 에이전트 "${m.name}"의 실제 작업 방식을 페르소나 데이터로 정리해줘.\n\n아래 3가지를 각 3-4개 항목으로:\n1. 작업 접근 순서\n2. 실패 패턴과 대응\n3. 판단 기준\n\n현재:\n접근순서: ${m.persona.approach.join(' / ')}\n실패패턴: ${m.persona.failPatterns.join(' / ')}\n판단기준: ${m.persona.decisionRules.join(' / ')}\n\n개선된 버전을 한국어로.`
      }]
    });
    const answer = data.content[0].text;
    const panelId = 'upanel-' + modelId;
    document.getElementById(panelId)?.remove();
    const section = document.getElementById('psec-' + modelId);
    const panel = document.createElement('div');
    panel.className = 'update-panel'; panel.id = panelId;
    panel.innerHTML = `<div class="update-panel-title">Claude 제안 — 검토 후 저장하세요</div><textarea class="update-textarea" id="utext-${modelId}">${answer}</textarea><div class="update-btns"><button class="save-btn" onclick="savePersona('${modelId}')">저장</button><button class="cancel-btn" onclick="document.getElementById('${panelId}').remove()">취소</button></div>`;
    section.appendChild(panel);
  } catch (e) { alert('오류: ' + e.message); }
  btn.disabled = false; btn.textContent = '업데이트';
}

function savePersona(modelId) {
  const text = document.getElementById('utext-' + modelId).value;
  const stored = JSON.parse(localStorage.getItem('personaOverrides') || '{}');
  stored[modelId] = text;
  localStorage.setItem('personaOverrides', JSON.stringify(stored));
  document.getElementById('upanel-' + modelId)?.remove();
  renderContent();
  alert('저장 완료. 다음 페르소나 질문부터 반영됩니다.');
}

function getPersonaOverride(modelId) {
  const stored = JSON.parse(localStorage.getItem('personaOverrides') || '{}');
  return stored[modelId] || null;
}

// ── CHIPS ──
function renderChips() {
  const wrap = document.getElementById('chips'); wrap.innerHTML = '';
  MODELS.forEach(m => {
    const idx = selected.indexOf(m.id);
    const btn = document.createElement('button');
    btn.className = 'chip' + (idx === 0 ? ' s1' : idx === 1 ? ' s2' : idx === 2 ? ' s3' : '');
    const num = idx >= 0 ? `<div class="chip-num"><span class="chip-num-inner">${idx + 1}</span></div>` : '';
    btn.innerHTML = num + m.name;
    btn.onclick = () => selectModel(m.id);
    wrap.appendChild(btn);
  });
}

function selectModel(id) {
  const idx = selected.indexOf(id);
  if (idx >= 0) { selected.splice(idx, 1); }
  else { selected.push(id); if (selected.length > (tripleMode ? 3 : 2)) selected.shift(); }
  renderChips(); renderSelBar(); renderContent();
}

function toggleTriple() {
  tripleMode = !tripleMode;
  const btn = document.getElementById('tripleBtn');
  btn.classList.toggle('on', tripleMode);
  btn.textContent = tripleMode ? '3개 비교 ON ✓' : '3개 비교 모드';
  if (!tripleMode && selected.length > 2) selected = selected.slice(-2);
  renderChips(); renderSelBar(); renderContent();
}

function clearSel() { selected = []; renderChips(); renderSelBar(); renderContent(); }

function renderSelBar() {
  const el = document.getElementById('selInfo');
  if (!selected.length) { el.innerHTML = '모델을 클릭해서 선택하세요'; return; }
  if (selected.length === 1) { const _m = modelMap[selected[0]]; el.innerHTML = `<strong>${_m ? _m.name : selected[0]}</strong> 단독 보기`; return; }
  el.innerHTML = selected.map(id => { const _m = modelMap[id]; return `<strong>${_m ? _m.name : id}</strong>`; }).join(' vs ') + ' 비교 중';
}

// ── CONTENT ──
function renderContent() {
  const el = document.getElementById('content');
  if (!selected.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🤖</div><h2>모델을 선택하거나 검색해보세요</h2><p>검색창: 자연어 질문 → 추천 + 페르소나 설계<br>배너: 모델 클릭 → 단독 상세 / 2~3개 → 비교<br><br>검색 후 모델 클릭 → 해당 모델 작업 적합도 분석</p></div>`;
    return;
  }
  if (selected.length === 1) { const _m = modelMap[selected[0]]; if (_m) el.innerHTML = renderSingle(_m); else { selected = []; renderChips(); renderSelBar(); renderContent(); } return; }
  el.innerHTML = renderCompare(selected.map(id => modelMap[id]).filter(Boolean));
}

function renderSingle(m) {
  const override = getPersonaOverride(m.id);
  const personaBody = override
    ? `<div style="font-size:12px;line-height:1.85;color:#2a1f6e;white-space:pre-wrap">${override}</div>`
    : `<div class="persona-item"><div class="persona-item-title">작업 접근 순서</div><ul class="persona-list">${m.persona.approach.map(a => `<li>${a}</li>`).join('')}</ul></div>
       <div class="persona-item"><div class="persona-item-title">실패 패턴 & 대응</div><ul class="persona-list">${m.persona.failPatterns.map(f => `<li>${f}</li>`).join('')}</ul></div>
       <div class="persona-item" style="margin-bottom:0"><div class="persona-item-title">판단 기준</div><ul class="persona-list">${m.persona.decisionRules.map(d => `<li>${d}</li>`).join('')}</ul></div>`;
  const ops = Object.entries(m.opinions).map(([k, v]) => `<div class="opinion-item"><strong>${k}</strong>${v}</div>`).join('');
  const hCount = getAnalysisHistory(m.id).length;
  const hBadge = hCount > 0 ? `<span style="font-size:11px;color:var(--teal);background:var(--teal-bg);border:1px solid var(--teal-b);border-radius:99px;padding:2px 8px;margin-left:8px;cursor:pointer" onclick="showHistory('${m.id}')">📊 ${hCount}회 이력</span>` : '';
  const taskSection = lastQuery ? `
    <div class="task-analysis">
      <div class="ta-header">
        <span class="ta-title">🔍 작업 적합도 분석</span>
        <button class="ta-btn" id="ta-btn-${m.id}" onclick="analyzeTask('${m.id}')">이 작업 분석</button>
      </div>
      <div class="ta-query"><strong>분석할 작업:</strong>${lastQuery.length > 100 ? lastQuery.substring(0, 100) + '...' : lastQuery}</div>
      <div id="ta-result-${m.id}"></div>
      <div id="ta-actions-${m.id}" class="ta-actions"></div>
    </div>` : '';

  return `<div>
    ${taskSection}
    <div class="s-card">
      <div class="s-head"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px"><div class="s-name">${m.name}</div>${hBadge}</div><div class="s-role">${m.role}</div><span class="tag ${m.tag}">${m.tagName}</span></div>
      <div class="s-body">
        <div class="sec-lbl">정체성</div>
        <div style="font-size:13px;line-height:1.7;color:#444">${m.identity}</div>
        <div class="sec-lbl">강점 vs 약점</div>
        <div class="sw-grid">
          <div><div class="sw-title">강점</div><ul class="sl">${m.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>
          <div><div class="sw-title">약점</div><ul class="wl">${m.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul></div>
        </div>
        <div class="sec-lbl">사용 상황</div>
        <div class="info-row"><strong>혼자:</strong> ${m.alone}</div>
        <div class="info-row"><strong>조합:</strong> ${m.combo}</div>
        ${m.warn ? `<div class="warn-box">⚠️ ${m.warn}</div>` : ''}
        <div class="sec-lbl">페르소나 데이터</div>
        <div class="persona-section" id="psec-${m.id}">
          <div class="persona-header"><span class="persona-title">🎭 ${m.name} 페르소나</span><button class="persona-update-btn" id="pub-${m.id}" onclick="updatePersona('${m.id}')">업데이트</button></div>
          ${personaBody}
        </div>
        <div class="sec-lbl">다른 모델들의 시각</div>
        ${ops}
      </div>
    </div>
  </div>`;
}

function renderCompare(models) {
  const n = models.length, cls = `c${n}`;
  const sW = models.map(m => m.strengths.length), sWin = sW.indexOf(Math.max(...sW));
  const wW = models.map(m => m.weaknesses.length), wWin = wW.indexOf(Math.min(...wW));
  const heads = `<div class="cmp-header-row ${cls}">${models.map(m => `<div class="cmp-head-card"><div class="cmp-head-name">${m.name}</div><div class="cmp-head-role">${m.role.substring(0, 40)}…</div><span class="tag ${m.tag}" style="margin-top:6px;display:inline-block">${m.tagName}</span></div>`).join('')}</div>`;
  const strRows = `<div class="cmp-sec-lbl">강점</div>${models.map((m, i) => `<div class="cmp-cell ${i === sWin ? 'best' : ''}">${i === sWin ? '<div class="win-badge">강점 우위</div>' : ''}<ul class="cl">${m.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>`).join('')}`;
  const weakRows = `<div class="cmp-sec-lbl">약점</div>${models.map((m, i) => `<div class="cmp-cell ${i === wWin ? 'best' : ''}">${i === wWin ? '<div class="win-badge">약점 적음</div>' : ''}<ul class="wl2">${m.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul></div>`).join('')}`;
  const aloneRows = `<div class="cmp-sec-lbl">단독 사용</div>${models.map(m => `<div class="cmp-cell"><div style="font-size:12px;line-height:1.7">${m.alone}</div></div>`).join('')}`;
  const comboRows = `<div class="cmp-sec-lbl">조합 상황</div>${models.map(m => `<div class="cmp-cell"><div style="font-size:12px;line-height:1.7">${m.combo}</div></div>`).join('')}`;
  const warnRows = models.some(m => m.warn) ? `<div class="cmp-sec-lbl">유의사항</div>${models.map(m => `<div class="cmp-cell">${m.warn ? `<div class="warn-badge-sm">⚠️ 주의</div><div style="font-size:12px;line-height:1.6;margin-top:4px">${m.warn}</div>` : '<span style="color:var(--hint);font-size:12px">-</span>'}</div>`).join('')}` : '';
  let opRows = '';
  if (n === 2) {
    const [a, b] = models;
    opRows = `<div class="cmp-sec-lbl">상호 평가</div><div class="cmp-cell"><strong style="font-size:11px;color:var(--muted)">${a.name} → ${b.name}</strong><div style="font-size:12px;line-height:1.7;margin-top:4px">${a.opinions[b.name] || '-'}</div></div><div class="cmp-cell"><strong style="font-size:11px;color:var(--muted)">${b.name} → ${a.name}</strong><div style="font-size:12px;line-height:1.7;margin-top:4px">${b.opinions[a.name] || '-'}</div></div>`;
  }
  return `${heads}<div class="cmp-grid ${cls}">${strRows}${weakRows}${aloneRows}${comboRows}${warnRows}${opRows}</div>`;
}

init();
</script>
</body>
</html>
